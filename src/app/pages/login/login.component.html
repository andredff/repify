<div class="min-h-screen flex items-center justify-center p-4 bg-bg">

  <div class="w-full max-w-sm space-y-6">

    <!-- LOGO -->
    <div class="flex flex-col items-center gap-3 mb-2">
      <img src="logo-transparent.png" alt="Repify" class="h-20 w-auto" />
      <p class="text-[13px] font-body text-text-2">Sua jornada fitness começa aqui</p>
    </div>

    <!-- CARD -->
    <div class="bg-card border border-border rounded-2xl p-6 space-y-4">

      <!-- Google OAuth -->
      <button (click)="loginWithGoogle()" [disabled]="loadingGoogle()"
              class="w-full flex items-center justify-center gap-3 bg-white text-[#1A1A1A] py-3 rounded-xl font-semibold text-[14px] hover:bg-gray-100 active:scale-[0.98] transition-all disabled:opacity-60 shadow-sm">
        @if (loadingGoogle()) {
          <div class="w-4 h-4 rounded-full border-2 border-gray-400 border-t-transparent animate-spin"></div>
          Entrando...
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar com Google
        }
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-border"></div>
        <span class="text-[11px] font-body text-muted">ou</span>
        <div class="flex-1 h-px bg-border"></div>
      </div>

      <!-- Email + password -->
      <div class="space-y-3">
        <input
          type="email"
          placeholder="Seu email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-[14px] font-body text-white placeholder:text-muted focus:border-primary outline-none transition-colors"
        />

        <input
          type="password"
          placeholder="Sua senha"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          (keydown.enter)="login()"
          class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-[14px] font-body text-white placeholder:text-muted focus:border-primary outline-none transition-colors"
        />

        @if (error()) {
          <p class="text-danger text-[13px] font-body text-center">{{ error() }}</p>
        }

        <button
          (click)="login()"
          [disabled]="loading()"
          class="w-full bg-primary text-bg py-3 rounded-xl text-[14px] font-display font-bold shadow-glow hover:shadow-glow-lg active:scale-[0.98] transition-all disabled:opacity-60"
        >
          {{ loading() ? 'Entrando...' : 'Entrar' }}
        </button>

        <button
          type="button"
          (click)="continueAsGuest()"
          class="w-full border border-border bg-card-2 text-white py-3 rounded-xl text-[14px] font-body font-semibold transition-colors hover:border-primary/40 hover:text-primary"
        >
          Entrar como visitante
        </button>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center text-[13px] font-body text-text-2">
      Não tem conta?
      <a routerLink="/register" class="text-primary font-semibold">Criar agora</a>
    </p>

  </div>

</div>
