<div class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-card border border-border rounded-2xl p-6 space-y-6">

    <!-- LOGO -->
    <div class="flex justify-center">
      <img src="logo-transparent.png" alt="Repify" class="h-24 w-auto" />
    </div>

    <!-- FORM -->
    <div class="space-y-4">

      <input
        type="email"
        placeholder="Seu email"
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        class="w-full bg-bg border border-border rounded-xl p-3 focus:border-primary outline-none transition-colors"
      />

      <input
        type="password"
        placeholder="Sua senha"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        class="w-full bg-bg border border-border rounded-xl p-3 focus:border-primary outline-none transition-colors"
      />

      @if (error()) {
        <p class="text-danger text-sm text-center">{{ error() }}</p>
      }

      <button
        (click)="login()"
        [disabled]="loading()"
        class="w-full bg-primary text-black py-3 rounded-xl font-semibold hover:shadow-[0_0_20px_#00FF88] transition disabled:opacity-60"
      >
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

    </div>

    <!-- EXTRA -->
    <div class="text-center text-sm text-gray-400">
      Não tem conta?
      <a routerLink="/register" class="text-primary cursor-pointer">Criar agora</a>
    </div>

  </div>

</div>
