<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Repify</title>
    <base href="/" />

    <!-- Tema / cores do navegador -->
    <meta name="theme-color" content="#080C10" />

    <link rel="manifest" href="manifest.webmanifest" />
